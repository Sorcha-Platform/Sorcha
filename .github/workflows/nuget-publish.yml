name: NuGet Publish — Auto Version & Release

on:
  push:
    branches: [ master ]
    paths:
      - 'src/Common/**'

  workflow_dispatch:
    inputs:
      force_publish_all:
        description: 'Force publish all packages'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changed_libraries: ${{ steps.detect.outputs.changed_libraries }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed libraries
        id: detect
        run: |
          if [ "${{ github.event.inputs.force_publish_all }}" == "true" ]; then
            echo "Force publishing all libraries"
            CHANGED='["Sorcha.Register.Models","Sorcha.Tenant.Models","Sorcha.Blueprint.Models","Sorcha.Storage.Abstractions","Sorcha.Cryptography","Sorcha.Blueprint.Schemas","Sorcha.Storage.InMemory","Sorcha.Storage.EFCore","Sorcha.Storage.MongoDB","Sorcha.Storage.Redis","Sorcha.TransactionHandler","Sorcha.Validator.Core","Sorcha.Wallet.Core","Sorcha.ServiceClients","Sorcha.ServiceDefaults"]'
          else
            CHANGED="["
            FIRST=true
            for dir in src/Common/*/; do
              LIB=$(basename "$dir")
              if git diff --name-only HEAD~1 HEAD | grep -q "src/Common/$LIB/"; then
                if [ "$FIRST" = true ]; then
                  FIRST=false
                else
                  CHANGED="$CHANGED,"
                fi
                CHANGED="$CHANGED\"$LIB\""
              fi
            done
            CHANGED="$CHANGED]"
          fi

          echo "changed_libraries=$CHANGED" >> "$GITHUB_OUTPUT"
          if [ "$CHANGED" = "[]" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Changed libraries: $CHANGED"

  publish:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        library: ${{ fromJson(needs.detect-changes.outputs.changed_libraries) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Bump minor version
        id: version
        run: |
          CSPROJ="src/Common/${{ matrix.library }}/${{ matrix.library }}.csproj"
          CURRENT=$(grep -oP '<Version>\K[^<]+' "$CSPROJ")

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="$MAJOR.$NEW_MINOR.0"

          sed -i "s|<Version>$CURRENT</Version>|<Version>$NEW_VERSION</Version>|" "$CSPROJ"

          echo "old_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped ${{ matrix.library }} from $CURRENT to $NEW_VERSION"

      - name: Restore and Build
        run: |
          dotnet restore
          dotnet build src/Common/${{ matrix.library }}/ --configuration Release --no-restore

      - name: Pack
        run: dotnet pack src/Common/${{ matrix.library }}/ --configuration Release --no-build -o ./nupkg

      - name: Publish to NuGet.org
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "src/Common/${{ matrix.library }}/${{ matrix.library }}.csproj"
          git commit -m "chore: bump ${{ matrix.library }} to ${{ steps.version.outputs.new_version }}" || true
          git push || true
