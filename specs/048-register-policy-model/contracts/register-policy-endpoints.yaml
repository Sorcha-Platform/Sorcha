# Register Policy API Contracts
# Feature: 048-register-policy-model
# These endpoints are served by the Register Service and proxied via API Gateway

openapi: 3.1.0
info:
  title: Register Policy API
  version: 1.0.0
  description: Endpoints for managing register operational policy

paths:
  /api/registers/creation/initiate:
    post:
      summary: Initiate register creation (extended with policy)
      description: >
        Extended to accept optional RegisterPolicy in the creation request.
        If omitted, default policy values are applied at genesis.
      operationId: InitiateRegisterCreation
      tags: [Register Creation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiateRegisterCreationRequest'
      responses:
        '200':
          description: Attestations ready to sign
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitiateRegisterCreationResponse'
        '400':
          description: Invalid policy configuration

  /api/registers/{registerId}/policy:
    get:
      summary: Get current register policy
      description: >
        Returns the active RegisterPolicy for a register. For registers without
        an explicit policy (pre-feature), returns default values.
      operationId: GetRegisterPolicy
      tags: [Register Policy]
      parameters:
        - name: registerId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-f0-9]{32}$'
      responses:
        '200':
          description: Current policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterPolicyResponse'
        '404':
          description: Register not found

  /api/registers/{registerId}/policy/history:
    get:
      summary: Get policy version history
      description: Returns all policy versions for a register, ordered by version descending.
      operationId: GetPolicyHistory
      tags: [Register Policy]
      parameters:
        - name: registerId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-f0-9]{32}$'
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Policy history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyHistoryResponse'

  /api/registers/{registerId}/policy/update:
    post:
      summary: Propose a policy update
      description: >
        Submits a policy update as a control.policy.update Control transaction.
        Subject to the register's current governance quorum rules.
        Policy is validated before submission.
      operationId: ProposePolicyUpdate
      tags: [Register Policy]
      parameters:
        - name: registerId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-f0-9]{32}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyUpdateRequest'
      responses:
        '202':
          description: Policy update submitted for governance approval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyUpdateResponse'
        '400':
          description: Invalid policy (validation failed before vote)
        '403':
          description: Not authorized (not an admin/owner)
        '409':
          description: Version conflict (stale policy version)

  /api/registers/{registerId}/validators/approved:
    get:
      summary: List approved validators (on-chain)
      description: >
        Returns the on-chain approved validator list from the register's policy.
        This is the authorization list, not the operational presence list.
      operationId: ListApprovedValidators
      tags: [Validators]
      parameters:
        - name: registerId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-f0-9]{32}$'
      responses:
        '200':
          description: Approved validator list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovedValidatorsResponse'

  /api/registers/{registerId}/validators/operational:
    get:
      summary: List operational validators (Redis)
      description: >
        Returns validators currently online (Redis entries with active TTL).
        This is the real-time operational list used by the consensus engine.
      operationId: ListOperationalValidators
      tags: [Validators]
      parameters:
        - name: registerId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-f0-9]{32}$'
      responses:
        '200':
          description: Operational validator list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationalValidatorsResponse'

components:
  schemas:
    InitiateRegisterCreationRequest:
      type: object
      required: [name, tenantId, owners]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 38
        description:
          type: string
          maxLength: 500
        tenantId:
          type: string
        owners:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OwnerInfo'
        additionalAdmins:
          type: array
          items:
            $ref: '#/components/schemas/AdditionalAdminInfo'
        metadata:
          type: object
          additionalProperties:
            type: string
        advertise:
          type: boolean
          default: false
        policy:
          $ref: '#/components/schemas/RegisterPolicy'
          description: Optional policy settings. Defaults applied if omitted.

    RegisterPolicy:
      type: object
      required: [version, governance, validators, consensus, leaderElection]
      properties:
        version:
          type: integer
          minimum: 1
        governance:
          $ref: '#/components/schemas/GovernanceConfig'
        validators:
          $ref: '#/components/schemas/ValidatorConfig'
        consensus:
          $ref: '#/components/schemas/ConsensusConfig'
        leaderElection:
          $ref: '#/components/schemas/LeaderElectionConfig'
        updatedAt:
          type: string
          format: date-time
        updatedBy:
          type: string

    GovernanceConfig:
      type: object
      properties:
        quorumFormula:
          type: string
          enum: [strict-majority, supermajority, unanimous]
          default: strict-majority
        proposalTtlDays:
          type: integer
          minimum: 1
          maximum: 90
          default: 7
        ownerCanBypassQuorum:
          type: boolean
          default: true
        blueprintVersion:
          type: string
          maxLength: 100
          default: register-governance-v1

    ValidatorConfig:
      type: object
      properties:
        registrationMode:
          type: string
          enum: [public, consent]
          default: public
        approvedValidators:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/ApprovedValidator'
          default: []
        minValidators:
          type: integer
          minimum: 1
          default: 1
        maxValidators:
          type: integer
          minimum: 1
          maximum: 100
          default: 100
        requireStake:
          type: boolean
          default: false
        stakeAmount:
          type: number
          nullable: true
        operationalTtlSeconds:
          type: integer
          minimum: 10
          maximum: 600
          default: 60

    ApprovedValidator:
      type: object
      required: [did, publicKey, approvedAt]
      properties:
        did:
          type: string
          maxLength: 255
        publicKey:
          type: string
          description: Base64-encoded public key
        approvedAt:
          type: string
          format: date-time
        approvedBy:
          type: string
          nullable: true

    ConsensusConfig:
      type: object
      properties:
        signatureThresholdMin:
          type: integer
          minimum: 1
          default: 2
        signatureThresholdMax:
          type: integer
          minimum: 1
          default: 10
        maxTransactionsPerDocket:
          type: integer
          minimum: 1
          maximum: 10000
          default: 1000
        docketBuildIntervalMs:
          type: integer
          minimum: 10
          maximum: 60000
          default: 100
        docketTimeoutSeconds:
          type: integer
          minimum: 5
          maximum: 300
          default: 30

    LeaderElectionConfig:
      type: object
      properties:
        mechanism:
          type: string
          enum: [rotating, raft, stake-weighted]
          default: rotating
        heartbeatIntervalMs:
          type: integer
          minimum: 100
          maximum: 30000
          default: 1000
        leaderTimeoutMs:
          type: integer
          minimum: 200
          maximum: 60000
          default: 5000
        termDurationSeconds:
          type: integer
          minimum: 10
          nullable: true
          default: 60

    PolicyUpdateRequest:
      type: object
      required: [policy, updatedBy]
      properties:
        policy:
          $ref: '#/components/schemas/RegisterPolicy'
          description: Full policy snapshot with version incremented
        transitionMode:
          type: string
          enum: [immediate, grace-period]
          description: Required when changing registrationMode from public to consent
        updatedBy:
          type: string
          description: DID of the proposer
        approvalSignatures:
          type: array
          items:
            $ref: '#/components/schemas/ApprovalSignature'

    ApprovalSignature:
      type: object
      required: [approverDid, signature, isApproval, votedAt]
      properties:
        approverDid:
          type: string
        signature:
          type: string
        isApproval:
          type: boolean
        votedAt:
          type: string
          format: date-time
        comment:
          type: string
          maxLength: 500

    RegisterPolicyResponse:
      type: object
      properties:
        registerId:
          type: string
        policy:
          $ref: '#/components/schemas/RegisterPolicy'
        isDefault:
          type: boolean
          description: True if policy was generated from defaults (no explicit policy on-chain)

    PolicyUpdateResponse:
      type: object
      properties:
        txId:
          type: string
          description: Control transaction ID
        registerId:
          type: string
        newVersion:
          type: integer
        status:
          type: string
          enum: [submitted, approved, rejected]

    PolicyHistoryResponse:
      type: object
      properties:
        registerId:
          type: string
        versions:
          type: array
          items:
            type: object
            properties:
              version:
                type: integer
              policy:
                $ref: '#/components/schemas/RegisterPolicy'
              txId:
                type: string
              committedAt:
                type: string
                format: date-time
        page:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer

    ApprovedValidatorsResponse:
      type: object
      properties:
        registerId:
          type: string
        registrationMode:
          type: string
        validators:
          type: array
          items:
            $ref: '#/components/schemas/ApprovedValidator'
        count:
          type: integer

    OperationalValidatorsResponse:
      type: object
      properties:
        registerId:
          type: string
        validators:
          type: array
          items:
            type: object
            properties:
              validatorId:
                type: string
              did:
                type: string
              status:
                type: string
              ttlRemainingSeconds:
                type: integer
              lastHeartbeat:
                type: string
                format: date-time
        count:
          type: integer

    OwnerInfo:
      type: object
      required: [userId, walletId]
      properties:
        userId:
          type: string
        walletId:
          type: string

    AdditionalAdminInfo:
      type: object
      required: [userId, walletId]
      properties:
        userId:
          type: string
        walletId:
          type: string
        role:
          type: string
          enum: [Admin, Auditor, Designer]
          default: Admin
