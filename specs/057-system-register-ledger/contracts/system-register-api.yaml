# System Register API Contracts
# These endpoints are convenience wrappers over the real register transaction API.
# All endpoints require CanManageRegisters authorization.

openapi: 3.0.3
info:
  title: Sorcha System Register API
  version: 2.0.0
  description: >
    Convenience API for the system register. Internally queries transactions
    on the real system register (ID: aebf26362e079087571ac0932d4db973).

paths:
  /api/system-register:
    get:
      operationId: GetSystemRegisterInfo
      summary: Get system register status and summary
      description: >
        Returns the current status of the system register by querying the real
        register metadata (height, transaction count) and filtering for
        blueprint transactions.
      responses:
        '200':
          description: System register status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemRegisterInfo'
        '401':
          description: Unauthorized

  /api/system-register/initialize:
    post:
      operationId: InitializeSystemRegister
      summary: Initialize the system register
      description: >
        Triggers system register bootstrap if not already initialized.
        Creates the register via the standard two-phase flow and publishes
        seed blueprints as transactions. Idempotent — safe to call repeatedly.
      responses:
        '200':
          description: Initialization result
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  status:
                    $ref: '#/components/schemas/SystemRegisterInfo'
        '401':
          description: Unauthorized
        '500':
          description: Initialization failed

  /api/system-register/blueprints:
    get:
      operationId: GetSystemRegisterBlueprints
      summary: List system register blueprints with pagination
      description: >
        Returns blueprints by querying transactions on the system register
        filtered by BlueprintPublish metadata type. Results ordered by
        transaction timestamp descending.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Paginated blueprint list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBlueprintResponse'
        '401':
          description: Unauthorized

  /api/system-register/blueprints/{blueprintId}:
    get:
      operationId: GetSystemRegisterBlueprint
      summary: Get a specific blueprint from the system register
      description: >
        Retrieves the latest version of a blueprint by searching transactions
        with matching BlueprintId metadata.
      parameters:
        - name: blueprintId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Blueprint details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlueprintDetail'
        '404':
          description: Blueprint not found
        '401':
          description: Unauthorized

  /api/system-register/publish:
    post:
      operationId: PublishBlueprint
      summary: Publish a blueprint to the system register
      description: >
        Submits a blueprint as a transaction on the system register.
        The blueprint JSON becomes the transaction payload, signed by the
        system wallet and validated through the standard flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishBlueprintRequest'
      responses:
        '201':
          description: Blueprint published
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactionId:
                    type: string
                  blueprintId:
                    type: string
                  message:
                    type: string
        '400':
          description: Invalid blueprint
        '401':
          description: Unauthorized

components:
  schemas:
    SystemRegisterInfo:
      type: object
      properties:
        registerId:
          type: string
          example: aebf26362e079087571ac0932d4db973
        name:
          type: string
          example: Sorcha System Register
        status:
          type: string
          enum: [initialized, not_initialized]
        blueprintCount:
          type: integer
        height:
          type: integer
          description: Register height (number of sealed dockets)
        transactionCount:
          type: integer
          description: Total transactions on the register
        createdAt:
          type: string
          format: date-time
          nullable: true

    PaginatedBlueprintResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BlueprintSummary'
        page:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer
        totalPages:
          type: integer

    BlueprintSummary:
      type: object
      properties:
        blueprintId:
          type: string
        transactionId:
          type: string
        version:
          type: integer
        publishedAt:
          type: string
          format: date-time
        publishedBy:
          type: string
        isActive:
          type: boolean
          description: Always true (immutable ledger)

    BlueprintDetail:
      type: object
      properties:
        blueprintId:
          type: string
        transactionId:
          type: string
        title:
          type: string
        version:
          type: integer
        publishedAt:
          type: string
          format: date-time
        publishedBy:
          type: string
        isActive:
          type: boolean
        description:
          type: string
        document:
          type: object
          description: Full blueprint JSON document

    PublishBlueprintRequest:
      type: object
      required:
        - blueprintId
        - blueprint
      properties:
        blueprintId:
          type: string
          description: Logical blueprint identifier
        blueprint:
          type: object
          description: Blueprint JSON document
        previousTransactionId:
          type: string
          nullable: true
          description: Transaction ID of the previous version (for version chaining)
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Optional metadata key-value pairs
